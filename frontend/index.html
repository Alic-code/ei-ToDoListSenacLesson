<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <title>Todo List</title>
</head>

<body>

<main class="container">

    <!-- ===============================
         HEADER (PRONTO)
    =============================== -->
    <header class="header">
        <h1>Todo List</h1>
        <p>Organize suas tarefas</p>
    </header>


    <!-- ===============================
         DESAFIO 1 (HTML)
         Aluno: deve montar os cards
    =============================== -->
    

    <section class="stats">

        <section class="stats">

            <div class="stat-card">
                <span class="stat-numero" id="total-tarefas">0</span>
                <span class="stat-label">Total</span>
            </div>

            <div class="stat-card">
                <span class="stat-numero" id="tarefas-ativas">0</span>
                <span class="stat-label">Ativas</span>
            </div>

            <div class="stat-card">
                <span class="stat-numero" id="tarefas-completas">0</span>
                <span class="stat-label">Completass</span>
            </div>

        </section>
    </section>


    <!-- ===============================
         ADD TASK (PRONTO)
    =============================== -->
    <section class="add-task">
        <input type="text" placeholder="Nova tarefa...">
        <button class="btn-add">Adicionar</button>
    </section>


    <!-- ===============================
         FILTROS (PARCIAL)
         Aluno: pode estilizar e melhorar
    =============================== -->
    <section class="filters">
        <button class="filter active">Todas</button>
        <button class="filter">Ativas</button>
        <button class="filter">Completas</button>
    </section>


    <!-- ===============================
        LISTA (PRONTA E VAZIA)
    =============================== -->
    

    <section class="tasks">

        <section class="lista-tarefas">

            <ul id="lista">

                <li class="tarefa completa">
                    <label class="tarefa-conteudo">
                        <input type="checkbox" checked>
                        <span>Criar uma todo list moderna</span>
                    </label>
                </li>

                <li class="tarefa">
                    <label class="tarefa-conteudo">
                        <input type="checkbox">
                        <span>Adicionar animações suaves</span>
                    </label>
                </li>

                <li class="tarefa">
                    <label class="tarefa-conteudo">
                        <input type="checkbox">
                        <span>Tornar o design responsivo</span>
                    </label>
                </li>

            </ul>

        </section>

        <!-- JS vai renderizar aqui -->
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
